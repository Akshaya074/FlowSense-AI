<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #fafafa;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h3 {
      margin: 0 0 2px 0;
      color: #09090b;
      font-size: 15px;
      font-weight: 700;
    }
    p {
      margin: 0 0 10px 0;
      color: #71717a;
      font-size: 11px;
      line-height: 1.4;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 10px;
      font-weight: 700;
      color: #3f3f46;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      padding: 8px 10px;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus {
      border-color: #2563eb;
    }
    button {
      padding: 8px 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .status {
      font-size: 11px;
      color: #10b981;
      font-weight: 500;
      margin-top: 2px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>FlowSense AI Tracker</h3>
    <p>Link this extension to record reference documentation visits directly to your dashboard.</p>
    
    <div class="form-group">
      <label for="patInput">Personal Access Token</label>
      <input type="password" id="patInput" placeholder="fs_pat_live_..." />
    </div>

    <div class="form-group">
      <label for="urlInput">Service URL</label>
      <input type="text" id="urlInput" placeholder="https://flow-sense-ai-self.vercel.app" />
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="statusMsg" class="status">Settings saved successfully!</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
